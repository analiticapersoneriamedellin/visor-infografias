<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro Animado de Infografías con Zoom</title>
    
    <!-- Cargamos jQuery y Turn.js -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
        }

        /* Contenedor que ajustará su altura en el flujo de la página */
        .scale-wrapper {
            width: 100%;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto; /* Permite scroll cuando hay zoom en pantallas pequeñas */
            padding: 20px;
            border-radius: 8px;
        }

        /* El contenedor rígido del libro que escalaremos con CSS */
        .scale-container {
            width: 800px; 
            height: 550px;
            transform-origin: center center;
            flex-shrink: 0;
            transition: transform 0.2s ease-out; /* Transición suave al hacer zoom */
        }

        /* El visor de Turn.js */
        #book-viewport {
            width: 800px;
            height: 550px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.15);
            cursor: pointer;
        }

        /* Páginas individuales */
        #book-viewport .page {
            width: 400px;
            height: 550px;
            background-color: #ffffff;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Barra de herramientas inferior */
        .controles {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #002d62; /* Azul institucional */
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #004080;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Estilo especial para los botones de zoom */
        .btn-zoom {
            background-color: #4a5568; /* Color gris oscuro distinguible */
        }
        .btn-zoom:hover {
            background-color: #2d3748;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="scale-wrapper" id="wrapper">
            <div class="scale-container" id="scaler">
                <div id="book-viewport">
                    <!-- Páginas vinculadas archivos -->
                    <div class="page" style="background-image: url('png1.png');"></div>
                    <div class="page" style="background-image: url('png2.png');"></div>
                    <div class="page" style="background-image: url('png3.png');"></div>
                    <div class="page" style="background-image: url('png4.png');"></div>
                </div>
            </div>
        </div>

        <div class="controles">
            <!-- Navegación -->
            <button class="btn" id="prev-btn">◀ Anterior</button>
            
            <!-- Botones de Lupa (Zoom) -->
            <button class="btn btn-zoom" id="zoom-in-btn">Acercar (+)</button>
            <button class="btn btn-zoom" id="zoom-out-btn">Alejar (-)</button>
            
            <button class="btn" id="next-btn">Siguiente ▶</button>
        </div>
    </div>

    <script type="text/javascript">
        const anchoLibro = 800;
        const altoLibro = 550;
        
        // Variables para controlar el estado del zoom y escala adaptativa
        var escalaBase = 1;
        var nivelZoom = 1; // 1 es el tamaño normal, irá subiendo o bajando

        function calcularEscalaBase() {
            var anchoPantalla = $(window).width();
            var scale = 1;

            if (anchoPantalla < anchoLibro) {
                scale = (anchoPantalla * 0.90) / anchoLibro; // 90% del viewport
            }
            return scale;
        }

        function aplicarTransformacion() {
            // Combinamos la escala adaptativa base de la pantalla con el nivel de zoom del usuario
            var escalaFinal = escalaBase * nivelZoom;

            // Aplicamos la transformación combinada
            $('#scaler').css({
                'transform': 'scale(' + escalaFinal + ')',
                '-webkit-transform': 'scale(' + escalaFinal + ')'
            });

            // Ajustamos el alto del wrapper físico para que no se corten los botones
            var nuevaAlturaFisica = altoLibro * escalaFinal;
            $('#wrapper').css('height', (nuevaAlturaFisica + 40) + 'px');
        }

        $(document).ready(function() {
            // Inicializamos Turn.js con sus medidas estables
            $('#book-viewport').turn({
                width: anchoLibro,
                height: altoLibro,
                autoCenter: true,
                gradients: true,
                acceleration: true
            });

            // Medimos y aplicamos escala inicial
            escalaBase = calcularEscalaBase();
            aplicarTransformacion();

            // Configurar botones de navegación
            $('#prev-btn').on('click', function() {
                $('#book-viewport').turn('previous');
            });

            $('#next-btn').on('click', function() {
                $('#book-viewport').turn('next');
            });

            // FUNCIONALIDAD DE ZOOM (Aumentar de 0.25 en 0.25 hasta un máximo de 2x)
            $('#zoom-in-btn').on('click', function() {
                if (nivelZoom < 2.0) {
                    nivelZoom += 0.25;
                    aplicarTransformacion();
                }
            });

            // Disminuir zoom hasta un mínimo de 0.75x para pantallas muy grandes o 1x normal
            $('#zoom-out-btn').on('click', function() {
                if (nivelZoom > 1.0) {
                    nivelZoom -= 0.25;
                    aplicarTransformacion();
                }
            });
        });

        // Al cambiar tamaño de pantalla, recalculamos la escala base y mantenemos el nivel de zoom
        $(window).on('resize', function() {
            escalaBase = calcularEscalaBase();
            aplicarTransformacion();
        });

        // Controles de teclado
        $(window).bind('keydown', function(e){
            if (e.keyCode == 37) {
                $('#book-viewport').turn('previous');
            } else if (e.keyCode == 39) {
                $('#book-viewport').turn('next');
            }
        });
    </script>

</body>
</html>
