<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro Animado de Infografías - Personería Distrital de Medellín</title>
    
    <!-- Cargamos jQuery y Turn.js -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            /* Fondo limpio y profesional */
            background-color: #f4f6f9; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
        }

        /* Contenedor del libro */
        .scale-wrapper {
            width: 100%;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto; 
            padding: 20px;
        }

        /* El contenedor rígido del libro que escalaremos con CSS */
        .scale-container {
            width: 800px; 
            height: 550px;
            transform-origin: center center;
            flex-shrink: 0;
            transition: transform 0.2s ease-out;
        }

        /* El visor de Turn.js */
        #book-viewport {
            width: 800px;
            height: 550px;
            box-shadow: 0 16px 38px rgba(0, 45, 98, 0.15); /* Sombra sutil con tono base */
            cursor: pointer;
        }

        /* Páginas individuales */
        #book-viewport .page {
            width: 400px;
            height: 550px;
            background-color: #ffffff;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Barra de herramientas inferior con Colores Institucionales */
        .controles {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .btn {
            /* Botones principales: Azul Institucional Oscuro (CMYK 91,79,62,97 simulado en HEX corporativo) */
            background-color: #0b151d; 
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #172635;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Botones de Zoom: Amarillo Institucional (Pantone 143 C / RGB: 249, 178, 51) */
        .btn-zoom {
            background-color: rgb(249, 178, 51); 
            color: #0b151d; /* Texto oscuro para máxima legibilidad */
        }
        
        .btn-zoom:hover {
            background-color: rgb(230, 160, 40);
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="scale-wrapper" id="wrapper">
            <div class="scale-container" id="scaler">
                <div id="book-viewport">
                    <!-- Páginas vinculadas a tus archivos -->
                    <div class="page" style="background-image: url('png1.png');"></div>
                    <div class="page" style="background-image: url('png2.png');"></div>
                    <div class="page" style="background-image: url('png3.png');"></div>
                    <div class="page" style="background-image: url('png4.png');"></div>
                </div>
            </div>
        </div>

        <div class="controles">
            <!-- Navegación Principal -->
            <button class="btn" id="prev-btn">◀ Anterior</button>
            
            <!-- Herramientas de Zoom con Color Corporativo -->
            <button class="btn btn-zoom" id="zoom-in-btn">🔍 Acercar (+)</button>
            <button class="btn btn-zoom" id="zoom-out-btn">🔍 Alejar (-)</button>
            
            <button class="btn" id="next-btn">Siguiente ▶</button>
        </div>
    </div>

    <script type="text/javascript">
        const anchoLibro = 800;
        const altoLibro = 550;
        
        var escalaBase = 1;
        var nivelZoom = 1;

        function calcularEscalaBase() {
            var anchoPantalla = $(window).width();
            var scale = 1;

            if (anchoPantalla < anchoLibro) {
                scale = (anchoPantalla * 0.90) / anchoLibro;
            }
            return scale;
        }

        function aplicarTransformacion() {
            var escalaFinal = escalaBase * nivelZoom;

            $('#scaler').css({
                'transform': 'scale(' + escalaFinal + ')',
                '-webkit-transform': 'scale(' + escalaFinal + ')'
            });

            var nuevaAlturaFisica = altoLibro * escalaFinal;
            $('#wrapper').css('height', (nuevaAlturaFisica + 40) + 'px');
        }

        $(document).ready(function() {
            $('#book-viewport').turn({
                width: anchoLibro,
                height: altoLibro,
                autoCenter: true,
                gradients: true,
                acceleration: true
            });

            escalaBase = calcularEscalaBase();
            aplicarTransformacion();

            $('#prev-btn').on('click', function() {
                $('#book-viewport').turn('previous');
            });

            $('#next-btn').on('click', function() {
                $('#book-viewport').turn('next');
            });

            $('#zoom-in-btn').on('click', function() {
                if (nivelZoom < 2.0) {
                    nivelZoom += 0.25;
                    aplicarTransformacion();
                }
            });

            $('#zoom-out-btn').on('click', function() {
                if (nivelZoom > 1.0) {
                    nivelZoom -= 0.25;
                    aplicarTransformacion();
                }
            });
        });

        $(window).on('resize', function() {
            escalaBase = calcularEscalaBase();
            aplicarTransformacion();
        });

        $(window).bind('keydown', function(e){
            if (e.keyCode == 37) {
                $('#book-viewport').turn('previous');
            } else if (e.keyCode == 39) {
                $('#book-viewport').turn('next');
            }
        });
    </script>

</body>
</html>
